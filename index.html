<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Unión Saludable | Enlaces</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="link-tree-container">
        
        <!-- Header -->
        <div class="header-card">
            <img src="assets/images/store_bg.png" alt="Nuestra Tienda" class="store-image">
            <div class="brand-info">
                <img src="assets/images/logo.png" alt="Logo Red Unión" class="logo">
                <h1>Red Unión Saludable</h1>
                <p><i class="fas fa-map-marker-alt" style="color: var(--gold);"></i> San Vicente de Chucurí</p>
                <p style="font-size: 0.85rem; margin-top: 8px;">Tu vecina experta. Soluciones naturales y prevención.</p>
            </div>
        </div>

        <!-- Links -->
        <div class="links-wrapper">
            <a href="https://wa.me/c/573213279207" target="_blank" class="link-btn btn-whatsapp">
                <i class="fab fa-whatsapp"></i> Chat en WhatsApp
            </a>
            
            <a href="https://www.instagram.com/redunionsaludable/" target="_blank" class="link-btn btn-instagram">
                <i class="fab fa-instagram"></i> Síguenos en Instagram
            </a>
            
            <a href="https://www.tiktok.com/@redunionsaludable?is_from_webapp=1&sender_device=pc" target="_blank" class="link-btn btn-tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            
            <a href="#" class="link-btn btn-catalog">
                <i class="fas fa-book-open"></i> Catálogo (Próximamente)
            </a>
        </div>

        <!-- Brands Grid -->
        <div class="brands-section">
            <h2>Marcas Aliadas</h2>
            <div class="brands-grid">
                <!-- Fallbacks applied in case clearbit fails -->
                <div class="brand-logo-container" title="FUXION"><img src="https://logo.clearbit.com/fuxion.com" alt="FUXION" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=FUXION&background=e6d5b8&color=244b3c&font-size=0.3&bold=true';"></div>
                <div class="brand-logo-container" title="4LIFE"><img src="https://logo.clearbit.com/4life.com" alt="4LIFE" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=4LIFE&background=e6d5b8&color=244b3c&font-size=0.3&bold=true';"></div>
                <div class="brand-logo-container" title="doTERRA"><img src="https://logo.clearbit.com/doterra.com" alt="doTERRA" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=doTERRA&background=e6d5b8&color=244b3c&font-size=0.3&bold=true';"></div>
                
                <div class="brand-logo-container" title="JUST"><img src="https://logo.clearbit.com/just.ch" alt="JUST" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=JUST&background=e6d5b8&color=244b3c&font-size=0.3&bold=true';"></div>
                <div class="brand-logo-container" title="OMNILIFE"><img src="https://logo.clearbit.com/omnilife.com" alt="OMNILIFE" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=OMNILIFE&background=e6d5b8&color=244b3c&font-size=0.3&bold=true';"></div>
                <div class="brand-logo-container" title="HERBALIFE"><img src="https://logo.clearbit.com/herbalife.com" alt="HERBALIFE" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=HERBALIFE&background=e6d5b8&color=244b3c&font-size=0.3&bold=true';"></div>
                
                <div class="brand-logo-container" title="NATURA"><img src="https://logo.clearbit.com/natura.com" alt="NATURA" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=NATURA&background=e6d5b8&color=244b3c&font-size=0.3&bold=true';"></div>
                <div class="brand-logo-container" title="ATOMY"><img src="https://logo.clearbit.com/atomy.com" alt="ATOMY" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=ATOMY&background=e6d5b8&color=244b3c&font-size=0.3&bold=true';"></div>
                <div class="brand-logo-container" title="INMUNOTEC"><img src="https://logo.clearbit.com/immunotec.com" alt="INMUNOTEC" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?name=INMUNOTEC&background=e6d5b8&color=244b3c&font-size=0.25&bold=true';"></div>
            </div>
        </div>

        <footer>
            &copy; 2026 Red Unión Saludable
        </footer>

    </div>

</body>
</html>
